name: "🚀 Feature Request / Solicitud de función"
description: "Suggest a new penetration skill or scan orchestration tool"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We are happy to receive suggestions to make VulnClaw a better automated agent.
  - type: textarea
    id: details
    attributes:
      label: "Proposed Feature Details / Detalles de la función"
      description: "What new scanning skill or orchestration step should be added?"
      placeholder: "Add support for Nmap vulnerability script scanning..."
    validations:
      required: true
