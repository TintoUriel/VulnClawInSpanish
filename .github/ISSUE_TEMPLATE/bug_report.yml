name: "🐛 Bug Report / Reportar defecto"
description: "Report a bug or incorrect agent step execution in VulnClaw"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to help us diagnose the issue. / Completa este formulario para ayudarnos a diagnosticar el problema.
  - type: textarea
    id: description
    attributes:
      label: "Bug Description / Descripción del defecto"
      description: "A clear description of what the issue is."
      placeholder: "e.g., Agent fails to load MCP tool chain under Windows..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps / Pasos para reproducir"
      description: "How can we reproduce the error?"
      placeholder: |
        1. Set target to...
        2. Run agent scan...
        3. See error logs...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs / Registros de ejecución"
      render: shell
